name: Tests
on:
- push
- pull_request
permissions:
  contents: read
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Setup Pixi
      uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
      with:
        activate-environment: true
    - name: Cache prek
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.cache/prek
        key: ${{ runner.os }}-prek-${{ hashFiles('**/.pre-commit-config.yaml', '**/pixi.lock') }}
        restore-keys: |
          ${{ runner.os }}-prek-
    - name: Run prek
      run: pixi run prek run --all-files --show-diff-on-failure --color=always
    - name: Python tests
      run: pixi run pytest --color=yes
    - name: R tests
      run: Rscript -e "packageVersion('arrow')"
      working-directory: r/
